name: Publish to npm & Docker

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip npm/Docker publish (just build + test)'
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run build
      - run: npm test

  publish:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    needs: [verify]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: npm ci
      - run: npm run build
      - run: npm test

      # ── OIDC-based npm publish (no npm token secret needed) ────────────

      - name: Get GitHub OIDC id_token
        id: jwt
        run: |
          JWT=$(curl -sSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org" \
            | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).value")
          echo -n "$JWT" > /tmp/oidc-jwt.txt

      - name: Publish @theaiinc/leyline
        run: |
          JWT=$(cat /tmp/oidc-jwt.txt)
          TOKEN=$(curl -sS -X POST \
            "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/@theaiinc%2fleyline" \
            -H "Authorization: Bearer $JWT" \
            | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).token")
          echo "//registry.npmjs.org/:_authToken=$TOKEN" > ~/.npmrc
          npm publish --access public

      # ── Docker images ──────────────────────────────────────────────────

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/theaiinc/leyline:${{ github.event.release.tag_name || github.ref_name }}
            ghcr.io/theaiinc/leyline:latest
            theaiinc/leyline:${{ github.event.release.tag_name || github.ref_name }}
            theaiinc/leyline:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ github.event.release.tag_name || github.ref_name }}

      - name: Push Docker Hub README
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
          repository: theaiinc/leyline
          short-description: The ultimate cost-optimizing LLM load balancer & gateway
          readme-filepath: ./README.md
